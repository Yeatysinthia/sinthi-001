<!DOCTYPE html>
<html>

<head>
    <title>Form Validation</title>
</head>

<body>

    <h2>Registration Form</h2>

    <form name="myForm" onsubmit="return validateForm()">
        Name: <input type="text" name="name"><br><br>
        Pass: <input type="text" name="password"><br><br>
        Email: <input type="text" name="email"><br><br>
        <input type="submit" value="Submit">
    </form>
    <script>
        function validateForm() {
            var name = document.myForm.name.value;
            var email = document.myForm.email.value;
            var password = document.myForm.password.value;

            // Name validation
            if (name == "") {
                alert("Name must be filled out");
                return false;
            }
            //password validation
            if (password.length < 4 || password.length > 8) {
                alert("Password must be between 4 and 8 characters");
                return false;
            }

            // Email validation
            if (email == "") {
                alert("Email must be filled out");
                return false;
            }



            // Simple email format check
            var atpos = email.indexOf("@");
            var dotpos = email.lastIndexOf(".");

            if (atpos < 1 || dotpos < atpos + 2 || dotpos + 2 >= email.length) {
                alert("Please enter a valid email address");
                return false;
            }






            if (email.indexOf("@") == -1 || email.indexOf(".") == -1) {
                alert("Invalid email");
                return false;
            }
            // If everything is OK, open new window
            var newWindow = window.open("", "", "width=400,height=300");

            newWindow.document.write("<h2>Form Submitted Successfully!</h2>");
            newWindow.document.write("Name: " + name + "<br>");
            newWindow.document.write("Pass: " + password + "<br>");
            newWindow.document.write("Email: " + email);

            return false; // Prevent actual form submission
        }
    </script>
</body>

</html>
