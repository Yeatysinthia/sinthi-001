<!DOCTYPE html>
<html>

<head>
    <title>Form Validation</title>
</head>

<body>
    <h2>Form</h2>

    <form name="myForm" onsubmit="return validateForm()">
        Name: <input type="text" name="name"><br><br>
        Password: <input type="text" name="password"><br><br>
        Email: <input type="text" name="email"><br><br>
        <input type="submit" value="Submit">
    </form>
    <script>
        function validateForm() {
            var name = document.myForm.name.value;
            var email = document.myForm.email.value;
            var password = document.myForm.password.value;


            if (name == "") {
                alert("Name field must not be empty");
                return false;
            }

            if (password.length < 5 || password.length > 8) {
                alert("Password must be between 5 and 8 characters");
                return false;
            }


            if (email == "") {
                alert("Email must be filled out");
                return false;
            }



            if (email.indexOf("@") == -1 || email.indexOf(".") == -1) {
                alert("Email must contain @ and .");
                return false;
            }

            var newWindow = window.open("", "", "width=400,height=300");

            newWindow.document.write("<h2>Form Submitted Successfully!</h2>");
            newWindow.document.write("Name: " + name + "<br>");
            newWindow.document.write("Pass: " + password + "<br>");
            newWindow.document.write("Email: " + email);

            return false;
        }
    </script>
</body>

</html>
